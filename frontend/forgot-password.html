<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset password – Langly</title>

  <!-- Google Fonts: Inter + Sora -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@600&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg-gradient: linear-gradient(180deg, #F5F7FF 0%, #EAE5FF 45%, #DDF9FF 100%);
      --primary: #4F46E5;      /* indigo button / links */
      --primary-hover: #4338CA;
      --accent: #14B8A6;       /* teal borders */
      --text-main: #0F172A;
      --text-muted: #6B7280;
      --danger: #DC2626;
      --success: #059669;
      --card-bg: rgba(255, 255, 255, 0.9);
      --border-radius-card: 24px;
      --border-radius-input: 12px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
        sans-serif;
      min-height: 100vh;
      background: var(--bg-gradient);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
    }

    /* HEADER */

    .header {
      height: 64px;
      padding: 0 120px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid rgba(148, 163, 184, 0.25);
    }

    .logo {
      font-family: "Sora", system-ui, sans-serif;
      font-weight: 600;
      font-size: 22px;
      letter-spacing: 0.02em;
      color: var(--primary);
    }

    .header-link {
      font-size: 14px;
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .header-link:hover {
      text-decoration: underline;
    }

    /* LAYOUT */

    .page {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 16px 64px;
    }

    .card {
      width: 420px;
      max-width: 100%;
      background: var(--card-bg);
      border-radius: var(--border-radius-card);
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.16);
      padding: 32px 32px 28px;
    }

    .card-title {
      font-size: 24px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 6px;
      color: var(--primary);
    }

    .card-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      color: var(--text-main);
    }

    .field input {
      width: 100%;
      height: 56px;
      padding: 0 14px;
      border-radius: var(--border-radius-input);
      border: 1px solid rgba(20, 184, 166, 0.65);
      background: #ffffff;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.25);
    }

    .btn {
      width: 100%;
      height: 56px;
      border-radius: 999px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.15s ease, transform 0.05s ease;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .small-text {
      margin-top: 16px;
      font-size: 13px;
      text-align: center;
      color: var(--text-muted);
    }

    .small-text a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 500;
    }

    .small-text a:hover {
      text-decoration: underline;
    }

    #message {
      margin-top: 8px;
      font-size: 13px;
      min-height: 18px;
      text-align: center;
    }

    #message.error {
      color: var(--danger);
    }

    #message.success {
      color: var(--success);
    }

    @media (max-width: 768px) {
      .header {
        padding: 0 20px;
      }
      .page {
        padding: 24px 12px 40px;
      }
      .card {
        padding: 24px 20px 22px;
      }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header class="header">
    <div class="logo">Langly</div>
    <a href="login.html" class="header-link">Back to log in</a>
  </header>

  <!-- MAIN CONTENT -->
  <main class="page">
    <div class="card">
      <h1 class="card-title">Reset your password</h1>
      <p class="card-subtitle">
        Enter the email you used for Langly and choose a new password.
        It should have at least 7 characters, 1 letter and 1 digit.
      </p>

      <form id="reset-form">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" autocomplete="email" required />
        </div>

        <div class="field">
          <label for="new-password">New password</label>
          <input
            id="new-password"
            type="password"
            autocomplete="new-password"
            required
          />
        </div>

        <div class="field">
          <label for="confirm-password">Confirm new password</label>
          <input
            id="confirm-password"
            type="password"
            autocomplete="new-password"
            required
          />
        </div>

        <button type="submit" class="btn">Save new password</button>
      </form>

      <div id="message"></div>

      <div class="small-text">
        Remembered it? <a href="login.html">Log in</a>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById("reset-form");
    const messageBox = document.getElementById("message");

    function setMessage(text, type) {
      messageBox.textContent = text || "";
      messageBox.className = type ? type : "";
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      setMessage("", "");

      const email = document.getElementById("email").value.trim();
      const newPassword = document.getElementById("new-password").value.trim();
      const confirmPassword = document
        .getElementById("confirm-password")
        .value.trim();

      if (!email || !newPassword || !confirmPassword) {
        setMessage("Please fill in all fields.", "error");
        return;
      }

      if (newPassword !== confirmPassword) {
        setMessage("Passwords do not match.", "error");
        return;
      }

      // simple client-side strength check (same логика, что и на сервере)
      const strongPw = /^(?=.*[A-Za-z])(?=.*\d).{7,}$/;
      if (!strongPw.test(newPassword)) {
        setMessage(
          "Password must be at least 7 characters long and contain at least one letter and one digit.",
          "error"
        );
        return;
      }

      try {
        const res = await fetch("http://127.0.0.1:8000/api/reset-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            email,
            new_password: newPassword,
            confirm_new_password: confirmPassword,
          }),
        });

        const data = await res.json();

        if (!res.ok) {
          setMessage(data.detail || "Could not reset password.", "error");
          return;
        }

        setMessage("Password changed successfully! Redirecting to log in…", "success");

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1200);
      } catch (err) {
        console.error(err);
        setMessage(
          "Cannot connect to API. Is the server running?",
          "error"
        );
      }
    });
  </script>
</body>
</html>
