<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>Langly – Profile</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@600&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/profile.css">

</head>

<body>

<header class="top-bar">

    <div class="brand" id="logo">
        Langly
    </div>

    <button id="logout-btn" class="logout-btn">
        Log out
    </button>

</header>


<div class="app-layout">


    <!-- SIDEBAR -->

    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->

    <main class="main-content">


        <div class="profile-card">

            <h1>Your Profile</h1>


            <div class="profile-section">

                <h3>Account Information</h3>

                <p>
                    <strong>Email:</strong>
                    <span id="profile-email"></span>
                </p>

                <p>
                    <strong>Level:</strong>
                    <span id="profile-level"></span>
                </p>

                <p>
                    <strong>XP:</strong>
                    <span id="profile-xp"></span>
                </p>

                <p>
                    <strong>Streak:</strong>
                     <span id="profile-streak"></span>
                </p>

            </div>


            <div class="profile-section">

                <h3>Language Settings</h3>

                <label for="language-select">
                    Active Language:
                </label>

                <select id="language-select"></select>

                <button class="primary-btn" onclick="changeLanguage()">
                    Save Language
                </button>

                <div id="language-message" class="form-message"></div>

            </div>


        </div>


    </main>

</div>

<script src="js/sidebar.js"></script>
<script src="js/app.js"></script>
<script src="js/profile.js"></script>

</body>
</html>
