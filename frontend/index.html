<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <title>Langly – Learn Smarter</title>

  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <header class="top-bar">
  <div class="brand">Langly</div>
  <a href="login.html" class="top-link">Log in</a>
  </header>

  <div class="hero-container">

    <div class="hero-content">

      <h1>Language Learning App</h1>

      <p>
        Learn vocabulary with smart spaced repetition.
        Practice whenever you want, and the app will tell you
        which words are worth reviewing.
      </p>

      <div class="buttons">
        <button class="btn btn-primary" onclick="window.location.href='signup.html'">
          Sign up
        </button>

        <button class="btn btn-secondary" onclick="window.location.href='login.html'">
          Log in
        </button>
      </div>

      <div class="api-status" id="api-status">
        Welcome to Langly
      </div>
    </div>

    <div class="hero-image">
      <img src="img/studying_girl.png" alt="Studying girl">
    </div>

  </div>

</body>
</html>
