<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>My Words – Langly</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@500;600&display=swap"
        rel="stylesheet"
    >
    
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/words.css">

</head>

<body>

<header class="top-bar">
    <div class="brand" id="logo">Langly</div>
    <button id="logout-btn" class="logout-btn" type="button">Log out</button>
</header>

<div class="app-layout">

    <div id="sidebar-container"></div>

    <main class="main-content">

        <div class="words-header-center">

            <h1>My Words</h1>

            <p class="subtitle">
                Organize and study your vocabulary
            </p>

            <button
                class="btn-main create-folder-top"
                id="open-folder-modal"
                type="button"
            >
                + Create Folder
            </button>

        </div>

        <div class="filters-bar">

            <input
                type="text"
                id="search-input"
                placeholder="Search..."
            >

            <div class="custom-select" id="sort-dropdown">

                <div class="select-selected">
                    Newest first
                </div>

                <div class="select-items select-hide">
                    <div data-value="new" class="selected">Newest first</div>
                    <div data-value="old">Oldest first</div>
                    <div data-value="az">A → Z</div>
                    <div data-value="za">Z → A</div>
                </div>

            </div>

        </div>

        <div id="folders-view">

            <div id="folders-grid" class="folders-grid"></div>

        </div>

        <div id="modules-view" style="display:none;">

            <button id="back-to-folders" class="back-btn" type="button">
                ← Back to folders
            </button>

            <h2 id="folder-title"></h2>

            <div id="modules-container" class="modules-grid"></div>

        </div>

        <div id="words-view" style="display:none;">

            <button id="back-to-modules" class="back-btn" type="button">
                ← Back to modules
            </button>

            <h2 id="module-title"></h2>

            <div class="add-word-card">

                <div class="add-word-row">

                    <input id="word-input" placeholder="Word">
                    <input id="translation-input" placeholder="Translation">

                    <button id="save-word-btn" class="btn-main" type="button">
                        Add Word
                    </button>

                </div>

                <div id="word-message" class="word-message hidden">
                    <span id="word-message-text"></span>
                    <button id="word-message-close" class="word-message-close" type="button">×</button>
                </div>

            </div>

            <div id="words-list" class="words-list"></div>

        </div>

    </main>

</div>

<div class="modal-overlay" id="folder-modal">

    <div class="modal">

        <h2>Create Folder</h2>

        <input
            type="text"
            id="folder-name-input"
            placeholder="Folder name"
        >

        <input
            type="text"
            id="folder-description"
            placeholder="Description (optional)"
        >

        <input
            type="text"
            id="folder-emoji"
            placeholder="Emoji (📚 ✈️ 🎵)"
        >

        <div class="modal-buttons">

            <button class="btn-main" id="create-folder-btn" type="button">
                Create
            </button>

            <button class="btn-secondary" id="close-folder-modal" type="button">
                Cancel
            </button>

        </div>

    </div>

</div>

<div class="modal-overlay" id="module-modal">

    <div class="modal">

        <h2>Create Module</h2>

        <input
            type="text"
            id="module-name-input"
            placeholder="Module name"
        >

        <div class="modal-buttons">

            <button class="btn-main" id="create-module-btn" type="button">
                Create
            </button>

            <button class="btn-secondary" id="close-module-modal" type="button">
                Cancel
            </button>

        </div>

    </div>

</div>

<svg style="display:none;">
    <symbol id="trash-icon" viewBox="0 0 24 24">
        <path fill="currentColor" d="M9 3h6l1 2h4v2H4V5h4l1-2zm1 6h2v8h-2V9zm4 0h2v8h-2V9zM6 9h2v8H6V9z"/>
    </symbol>
</svg>

<div class="modal-overlay" id="delete-modal">

    <div class="modal">

        <h2>Delete</h2>

        <p id="delete-text">Are you sure?</p>

        <div class="modal-buttons">

            <button class="btn-danger" id="confirm-delete" type="button">
                Delete
            </button>

            <button class="btn-secondary" id="cancel-delete" type="button">
                Cancel
            </button>

        </div>

    </div>

</div>

<script src="js/sidebar.js"></script>
<script src="js/app.js"></script>
<script src="js/words.js"></script>

</body>
</html>
