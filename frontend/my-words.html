<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <title>My Words – Langly</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@500;600&display=swap"
        rel="stylesheet"
    >
    
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/app.css">
    <link rel="stylesheet" href="css/words.css">

</head>

<body>

    <!-- ===================== TOP BAR ===================== -->

    <header class="top-bar">

        <div class="brand" id="logo">
            Langly
        </div>

        <button id="logout-btn" class="logout-btn">
            Log out
        </button>

    </header>


    <div class="app-layout">

        <!-- ===================== SIDEBAR ===================== -->

        <div id="sidebar-container"></div>


        <!-- ===================== MAIN CONTENT ===================== -->

        <main class="main-content">

            <!-- HEADER -->

            <div class="words-header-center">

                <h1>My Words</h1>

                <p class="subtitle">
                    Organize and study your vocabulary
                </p>

                <button
                    class="btn-main create-folder-top"
                    id="open-folder-modal"
                >
                    + Create Folder
                </button>

            </div>


            <!-- ===================== FOLDERS VIEW ===================== -->

            <div id="folders-view">

                <div
                    id="folders-grid"
                    class="folders-grid"
                >
                    <!-- folders loaded by JS -->
                </div>

            </div>


            <!-- ===================== MODULES VIEW ===================== -->

            <div id="modules-view" style="display:none;">

                <button
                    id="back-to-folders"
                    class="back-btn"
                >
                    ← Back to folders
                </button>

                <h2 id="folder-title"></h2>

                <div
                    id="modules-container"
                    class="modules-grid"
                >
                    <!-- modules loaded by JS -->
                </div>

            </div>


            <!-- ===================== WORDS VIEW ===================== -->

            <div id="words-view" style="display:none;">

                <button
                    id="back-to-modules"
                    class="back-btn"
                >
                    ← Back to modules
                </button>

                <h2 id="module-title"></h2>


                <!-- ADD WORD -->

                <div class="add-word-card">

                    <div class="add-word-row">

                        <input
                            id="word-input"
                            placeholder="Word"
                        >

                        <input
                            id="translation-input"
                            placeholder="Translation"
                        >

                        <button
                            id="save-word-btn"
                            class="btn-main"
                        >
                            Add Word
                        </button>

                    </div>

                    <div id="word-error" class="word-error"></div>

                </div>


                <!-- WORDS LIST -->

                <div
                    id="words-list"
                    class="words-list"
                ></div>

            </div>

        </main>

    </div>


    <!-- ===================== CREATE FOLDER MODAL ===================== -->

    <div
        class="modal-overlay"
        id="folder-modal"
    >

        <div class="modal">

            <h2>Create Folder</h2>

            <input
                type="text"
                id="folder-name-input"
                placeholder="Folder name"
            >

            <input
                type="text"
                id="folder-description"
                placeholder="Description (optional)"
            >

            <input
                type="text"
                id="folder-emoji"
                placeholder="Emoji (📚 ✈️ 🎵)"
            >

            <div class="modal-buttons">

                <button
                    class="btn-main"
                    id="create-folder-btn"
                >
                    Create
                </button>

                <button
                    class="btn-secondary"
                    id="close-folder-modal"
                >
                    Cancel
                </button>

            </div>

        </div>

    </div>


    <!-- ===================== CREATE MODULE MODAL ===================== -->

    <div
        class="modal-overlay"
        id="module-modal"
    >

        <div class="modal">

            <h2>Create Module</h2>

            <input
                type="text"
                id="module-name-input"
                placeholder="Module name"
            >

            <div class="modal-buttons">

                <button
                    class="btn-main"
                    id="create-module-btn"
                >
                    Create
                </button>

                <button
                    class="btn-secondary"
                    id="close-module-modal"
                >
                    Cancel
                </button>

            </div>

        </div>

    </div>


    <!-- ===================== SCRIPTS ===================== -->

    <script src="js/sidebar.js"></script>
    <script src="js/app.js"></script>
    <script src="js/words.js"></script>

</body>
</html>
